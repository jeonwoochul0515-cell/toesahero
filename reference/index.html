<style>
  :root {
    --yellow: #FFD60A;
    --yellow-soft: #FFF1A8;
    --orange: #FF6B35;
    --orange-soft: #FFD1BF;
    --ink: #0A0A0A;
    --ink-2: #2A2A2A;
    --cream: #FFFBF0;
    --paper: #FFFFFF;
    --line: #0A0A0A;
    --gray-1: #F4F1E8;
    --gray-2: #E8E3D5;
    --muted: #6B6B6B;
    --pink: #FF8FB1;
    --green: #4ADE80;
    --blue: #5B8DEF;
    --shadow: 6px 6px 0 0 var(--ink);
    --shadow-sm: 3px 3px 0 0 var(--ink);
    --shadow-lg: 10px 10px 0 0 var(--ink);
    --radius: 18px;
    --radius-sm: 10px;
    --radius-lg: 28px;
    --font-kr: "Pretendard Variable", Pretendard, system-ui, sans-serif;
    --font-en: "Space Grotesk", system-ui, sans-serif;
    --font-hand: "Gaegu", "Pretendard Variable", sans-serif;
  }

  /* palette swaps */
  body[data-palette="mint"] {
    --yellow: #B8F2D4;
    --yellow-soft: #DFF7E8;
    --orange: #2EC4B6;
    --orange-soft: #B6E8E2;
    --pink: #FFB5A7;
  }
  body[data-palette="peach"] {
    --yellow: #FFB5A7;
    --yellow-soft: #FFE0D6;
    --orange: #E5383B;
    --orange-soft: #FFC8C2;
    --pink: #FCBF49;
  }
  body[data-palette="lilac"] {
    --yellow: #C8B6FF;
    --yellow-soft: #E5DEFF;
    --orange: #7C5CE0;
    --orange-soft: #D4C5FF;
    --pink: #FFB6E1;
  }

  body[data-dark="true"] {
    --cream: #14110E;
    --paper: #1C1814;
    --ink: #FFFBF0;
    --ink-2: #E8E3D5;
    --line: #FFFBF0;
    --gray-1: #221E18;
    --gray-2: #2E2922;
    --muted: #A8A39A;
    --shadow: 6px 6px 0 0 var(--ink);
    --shadow-sm: 3px 3px 0 0 var(--ink);
    --shadow-lg: 10px 10px 0 0 var(--ink);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-kr);
    background: var(--cream);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* reusable */
  .wrap { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--paper); border: 2px solid var(--ink);
    border-radius: 999px; padding: 6px 12px;
    font-weight: 700; font-size: 13px;
    box-shadow: var(--shadow-sm);
    white-space: nowrap;
  }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    border: 2.5px solid var(--ink); border-radius: 14px;
    padding: 14px 22px; font-weight: 800; font-size: 16px;
    background: var(--paper); color: var(--ink);
    cursor: pointer; box-shadow: var(--shadow-sm);
    transition: transform .15s, box-shadow .15s;
    font-family: var(--font-kr); text-decoration: none;
    white-space: nowrap;
  }
  .btn:hover { transform: translate(-2px, -2px); box-shadow: 5px 5px 0 0 var(--ink); }
  .btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 0 var(--ink); }
  .btn.primary { background: var(--ink); color: var(--cream); }
  .btn.yellow { background: var(--yellow); }
  .btn.orange { background: var(--orange); color: var(--cream); }

  .card {
    background: var(--paper);
    border: 2.5px solid var(--ink);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }

  .stamp {
    display: inline-block;
    background: var(--orange);
    color: var(--cream);
    border: 2px solid var(--ink);
    padding: 4px 10px;
    border-radius: 999px;
    font-family: var(--font-en);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: .04em;
    transform: rotate(-3deg);
    box-shadow: var(--shadow-sm);
  }

  /* nav */
  nav.top {
    position: sticky; top: 0; z-index: 50;
    background: var(--cream);
    border-bottom: 2.5px solid var(--ink);
  }
  nav.top .inner {
    max-width: 1200px; margin: 0 auto; padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
  }
  nav.top .logo {
    display: flex; align-items: center; gap: 10px;
    font-weight: 900; font-size: 20px; letter-spacing: -.01em;
  }
  nav.top .links { display: flex; gap: 22px; align-items: center; }
  nav.top .links a {
    color: var(--ink); text-decoration: none; font-weight: 700; font-size: 15px;
    white-space: nowrap;
  }
  nav.top .links a:hover { text-decoration: underline; text-decoration-thickness: 3px; text-underline-offset: 4px; }
  nav.top .logo { white-space: nowrap; }
  nav.top .logo > * { white-space: nowrap; flex-shrink: 0; }
  @media (max-width: 1000px) {
    nav.top .links { display: none; }
  }

  /* sections */
  section { padding: 80px 0; position: relative; }
  @media (max-width: 700px) { section { padding: 56px 0; } }

  .eyebrow {
    display: inline-block;
    font-family: var(--font-en);
    font-weight: 700; font-size: 13px;
    letter-spacing: .14em; text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 14px;
  }
  .h2 {
    font-size: clamp(32px, 5vw, 52px);
    font-weight: 900; line-height: 1.1;
    letter-spacing: -.02em; margin: 0 0 20px;
  }
  .lead {
    font-size: clamp(15px, 1.4vw, 17px);
    color: var(--ink-2); line-height: 1.6; max-width: 60ch;
  }

  /* marquee */
  .marquee {
    overflow: hidden;
    background: var(--ink); color: var(--cream);
    border-top: 2.5px solid var(--ink); border-bottom: 2.5px solid var(--ink);
    padding: 14px 0;
  }
  .marquee-track {
    display: flex; gap: 40px; white-space: nowrap;
    animation: scroll 30s linear infinite;
    font-family: var(--font-en); font-weight: 700; font-size: 18px;
    letter-spacing: .04em;
  }
  @keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
  .marquee-track span { display: inline-flex; align-items: center; gap: 40px; }
  .marquee-track .star { color: var(--yellow); }

  /* utility */
  .grid { display: grid; gap: 20px; }
  .reveal {
    opacity: 0; transform: translateY(24px);
    transition: opacity .7s ease, transform .7s ease;
  }
  .reveal.in { opacity: 1; transform: none; }

  /* mascot */
  .mascot-wrap { position: relative; display: inline-block; }
  body[data-mascot="false"] .mascot { display: none !important; }

  /* float emergency button */
  .floater {
    position: fixed; right: 22px; bottom: 22px; z-index: 60;
    display: flex; flex-direction: column; align-items: flex-end; gap: 10px;
  }
  .floater-btn {
    background: var(--yellow); color: var(--ink);
    border: 2.5px solid var(--ink); border-radius: 999px;
    padding: 14px 18px; font-weight: 800; font-size: 15px;
    cursor: pointer; box-shadow: var(--shadow);
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--font-kr);
    transition: transform .2s;
    white-space: nowrap;
  }
  .floater-btn > span { white-space: nowrap; }
  .floater-btn:hover { transform: scale(1.05) rotate(-2deg); }
  .floater-btn .pulse {
    width: 10px; height: 10px; border-radius: 999px; background: var(--orange);
    box-shadow: 0 0 0 0 var(--orange);
    animation: pulse 1.6s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(255,107,53,.6); }
    70% { box-shadow: 0 0 0 14px rgba(255,107,53,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,107,53,0); }
  }

  /* modal */
  .modal-back {
    position: fixed; inset: 0; background: rgba(10,10,10,.6);
    z-index: 100; display: none; align-items: center; justify-content: center;
    padding: 20px; backdrop-filter: blur(4px);
  }
  .modal-back.open { display: flex; }
  .modal {
    background: var(--paper); border: 2.5px solid var(--ink);
    border-radius: 24px; box-shadow: var(--shadow-lg);
    width: 100%; max-width: 460px; max-height: 90vh;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .modal-head {
    background: var(--yellow); padding: 18px 22px;
    border-bottom: 2.5px solid var(--ink);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-head .who { display: flex; align-items: center; gap: 12px; }
  .modal-head .ava {
    width: 42px; height: 42px; border-radius: 999px;
    background: var(--ink); color: var(--yellow);
    display: grid; place-items: center; font-weight: 900;
    border: 2px solid var(--ink); font-size: 16px;
  }
  .modal-head .name { font-weight: 900; font-size: 16px; }
  .modal-head .status { font-size: 11px; color: var(--ink-2); display: flex; align-items: center; gap: 5px; }
  .modal-head .dot { width: 8px; height: 8px; border-radius: 999px; background: var(--green); }
  .modal-close {
    background: var(--paper); border: 2px solid var(--ink); border-radius: 8px;
    width: 30px; height: 30px; cursor: pointer; font-weight: 800; font-size: 16px;
  }
  .modal-body {
    padding: 22px; overflow-y: auto;
    background: var(--gray-1);
    flex: 1;
    display: flex; flex-direction: column; gap: 12px;
  }
  .bubble {
    padding: 12px 14px; border-radius: 14px; max-width: 80%;
    font-size: 14px; line-height: 1.5;
  }
  .bubble.them {
    background: var(--paper); border: 2px solid var(--ink); align-self: flex-start;
    border-bottom-left-radius: 4px;
  }
  .bubble.me {
    background: var(--yellow); border: 2px solid var(--ink); align-self: flex-end;
    border-bottom-right-radius: 4px; font-weight: 700;
  }
  .quick-replies {
    display: flex; flex-wrap: wrap; gap: 8px; padding: 0 22px 18px;
    border-top: 2px solid var(--gray-2); padding-top: 12px;
  }
  .qr {
    background: var(--paper); border: 2px solid var(--ink);
    border-radius: 999px; padding: 8px 14px; font-size: 13px;
    cursor: pointer; font-weight: 700; font-family: var(--font-kr);
  }
  .qr:hover { background: var(--yellow); }
  .modal-foot {
    padding: 16px 22px; border-top: 2.5px solid var(--ink);
    background: var(--paper);
    display: flex; gap: 10px;
  }
  .modal-foot .btn { flex: 1; }

  /* reduced motion */
  @media (prefers-reduced-motion: reduce) {
    .marquee-track { animation: none; }
    .reveal { opacity: 1; transform: none; transition: none; }
  }

  /* scrollbar styling */
  ::-webkit-scrollbar { width: 12px; height: 12px; }
  ::-webkit-scrollbar-track { background: var(--cream); }
  ::-webkit-scrollbar-thumb { background: var(--ink); border-radius: 999px; border: 3px solid var(--cream); }
</style>
</head>
